<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="sm-brief" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="sm-orch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="sm-craft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="sm-gate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="sm-meta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="sm-ui" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
    <filter id="sm-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.15"/>
    </filter>
    <marker id="sm-arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1100" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="800" y="40" fill="#0F172A" font-size="22" font-weight="700" text-anchor="middle">Composition Diagram → UI Surface Coverage Map</text>
  <text x="800" y="62" fill="#64748B" font-size="12" text-anchor="middle">Every diagram operation mapped to its corresponding UI surface(s)</text>


  <!-- LEFT COLUMN: Composition Diagram (Operations) -->
  <text x="300" y="100" fill="#0F172A" font-size="16" font-weight="700" text-anchor="middle">COMPOSITION DIAGRAM</text>
  <text x="300" y="118" fill="#64748B" font-size="10" text-anchor="middle">(Operations / Agents)</text>

  <!-- [Brief] -->
  <rect x="220" y="140" width="160" height="44" rx="22" fill="url(#sm-brief)" filter="url(#sm-shadow)"/>
  <text x="300" y="167" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">[Brief]</text>

  <!-- Arrow down -->
  <line x1="300" y1="184" x2="300" y2="210" stroke="#64748B" stroke-width="2" marker-end="url(#sm-arrow)"/>

  <!-- PlannerAgent -->
  <rect x="200" y="215" width="200" height="44" rx="8" fill="url(#sm-orch)" filter="url(#sm-shadow)"/>
  <text x="300" y="242" fill="#FFFFFF" font-size="12" font-weight="600" text-anchor="middle">PlannerAgent</text>

  <!-- Arrow down -->
  <line x1="300" y1="259" x2="300" y2="285" stroke="#64748B" stroke-width="2" marker-end="url(#sm-arrow)"/>

  <!-- OrchestratorAgent -->
  <rect x="180" y="290" width="240" height="44" rx="8" fill="url(#sm-orch)" filter="url(#sm-shadow)"/>
  <text x="300" y="317" fill="#FFFFFF" font-size="12" font-weight="600" text-anchor="middle">OrchestratorAgent</text>

  <!-- Arrow down -->
  <line x1="300" y1="334" x2="300" y2="360" stroke="#64748B" stroke-width="2" marker-end="url(#sm-arrow)"/>

  <!-- RouterAgent -->
  <rect x="200" y="365" width="200" height="44" rx="8" fill="url(#sm-orch)" filter="url(#sm-shadow)"/>
  <text x="300" y="392" fill="#FFFFFF" font-size="12" font-weight="600" text-anchor="middle">RouterAgent</text>

  <!-- Arrow down -->
  <line x1="300" y1="409" x2="300" y2="435" stroke="#64748B" stroke-width="2" marker-end="url(#sm-arrow)"/>

