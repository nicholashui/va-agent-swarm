  <text x="300" y="606" fill="#FFFFFF" font-size="12" font-weight="600" text-anchor="middle">JudgeAgent</text>

  <!-- Arrow down -->
  <line x1="300" y1="623" x2="300" y2="649" stroke="#64748B" stroke-width="2" marker-end="url(#sm-arrow)"/>

  <!-- GateKeeperAgent -->
  <rect x="180" y="654" width="240" height="44" rx="8" fill="url(#sm-gate)" filter="url(#sm-shadow)"/>
  <text x="300" y="681" fill="#FFFFFF" font-size="12" font-weight="600" text-anchor="middle">GateKeeperAgent</text>

  <!-- MemoryAgent (side branch) -->
  <rect x="100" y="720" width="160" height="38" rx="8" fill="#8B5CF6" opacity="0.85"/>
  <text x="180" y="744" fill="#FFFFFF" font-size="11" font-weight="600" text-anchor="middle">MemoryAgent</text>
