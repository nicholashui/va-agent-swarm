<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">Common AI Agent Structure</title>
  <desc id="desc">Professional reference diagram showing the common architecture shared by all agents in the video production workflow: orchestration, inputs, agent contract, execution loop, control planes, three-layer quality gates, release package, and feedback loops.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .panel { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.5; }
      .panel-soft { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1.5; }
      .panel-dark { fill: #0F172A; stroke: #0F172A; stroke-width: 1.5; }
      .panel-blue { fill: #EFF6FF; stroke: #93C5FD; stroke-width: 1.5; }
      .panel-green { fill: #ECFDF5; stroke: #86EFAC; stroke-width: 1.5; }
      .panel-amber { fill: #FFFBEB; stroke: #FCD34D; stroke-width: 1.5; }
      .panel-purple { fill: #F5F3FF; stroke: #C4B5FD; stroke-width: 1.5; }
      .panel-rose { fill: #FFF1F2; stroke: #FDA4AF; stroke-width: 1.5; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #475569; }
      .section { font: 700 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; letter-spacing: 1.6px; fill: #64748B; }
      .h1 { font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #0F172A; }
      .h1-dark { font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #FFFFFF; }
      .h2 { font: 700 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #0F172A; }
      .body { font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #334155; }
      .body-dark { font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #CBD5E1; }
      .mono { font: 400 11px ui-monospace, 'SF Mono', Menlo, Consolas, monospace; fill: #475569; }
      .mono-dark { font: 400 11px ui-monospace, 'SF Mono', Menlo, Consolas, monospace; fill: #CBD5E1; }
      .badge { font: 700 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; letter-spacing: 0.8px; }
      .small { font: 400 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #64748B; }
      .footer { font: 400 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #64748B; }
    </style>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D97706"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E11D48"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="980"/>

  <text x="40" y="48" class="title">Common AI Agent Structure</text>
  <text x="40" y="72" class="subtitle">Reference architecture shared by all agents in the video production workflow: governed execution, measurable quality, auditable outputs, and continuous improvement.</text>

  <g filter="url(#shadow)">
    <rect x="28" y="100" width="1384" height="852" rx="20" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  </g>

  <text x="54" y="126" class="section">ORCHESTRATION LAYER</text>
  <rect x="54" y="140" width="1332" height="78" rx="14" class="panel-soft"/>
  <rect x="72" y="160" width="236" height="38" rx="10" class="panel-blue"/>
  <text x="92" y="184" class="h2">PlannerAgent</text>
  <text x="212" y="184" class="body">scope and task graph</text>
  <rect x="324" y="160" width="236" height="38" rx="10" class="panel-blue"/>
  <text x="344" y="184" class="h2">OrchestratorAgent</text>
  <text x="495" y="184" class="body">state, retries, fan-out</text>
  <rect x="576" y="160" width="236" height="38" rx="10" class="panel-blue"/>
  <text x="596" y="184" class="h2">RouterAgent</text>
  <text x="705" y="184" class="body">agent and model selection</text>
  <rect x="828" y="160" width="236" height="38" rx="10" class="panel-blue"/>
  <text x="848" y="184" class="h2">GateKeeperAgent</text>
  <text x="985" y="184" class="body">phase and release approval</text>
  <rect x="1080" y="160" width="236" height="38" rx="10" class="panel-blue"/>
  <text x="1100" y="184" class="h2">MemoryAgent</text>
  <text x="1204" y="184" class="body">shared context and recall</text>

  <line x1="308" y1="179" x2="324" y2="179" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="560" y1="179" x2="576" y2="179" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="812" y1="179" x2="828" y2="179" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="1064" y1="179" x2="1080" y2="179" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <text x="54" y="258" class="section">AGENT ENTRY CONDITIONS</text>
  <rect x="54" y="272" width="296" height="184" rx="16" class="panel"/>
  <text x="76" y="302" class="h1">Input Package</text>
  <text x="76" y="330" class="body">Structured brief, phase ticket, and artifact manifest</text>
  <text x="76" y="352" class="mono">artifact_id | version | parent_assets</text>
  <text x="76" y="370" class="mono">technical_spec | target_channels</text>
  <text x="76" y="388" class="mono">rights_and_consent | continuity_state</text>
  <text x="76" y="406" class="mono">qc_status | provenance_manifest</text>
  <text x="76" y="434" class="small">Any missing required field blocks execution before tool use begins.</text>

  <rect x="54" y="478" width="296" height="170" rx="16" class="panel-purple"/>
  <text x="76" y="508" class="h1">Knowledge and Memory</text>
  <text x="76" y="536" class="body">Licensed corpora, validated references, episodic memory, and correction history ground each task.</text>
  <text x="76" y="564" class="body">Retrieval must be traceable, freshness-aware, and correction-aware.</text>
  <text x="76" y="592" class="mono">vector retrieval | summary memory | recall filters</text>
  <text x="76" y="620" class="small">Supports consistent decisions across phases, episodes, and revisions.</text>

  <rect x="54" y="670" width="296" height="170" rx="16" class="panel-blue"/>
  <text x="76" y="700" class="h1">Tool and Policy Surface</text>
  <text x="76" y="728" class="body">MCP tools, model providers, validators, and role-specific constitutions define what the agent may do and how it is scored.</text>
  <text x="76" y="756" class="mono">generation | editing | validation | registry lookup</text>
  <text x="76" y="774" class="mono">rubrics | compliance rules | timeout and retry policy</text>
  <text x="76" y="802" class="small">Least-privilege tool access and machine-readable logs are mandatory.</text>

  <text x="392" y="258" class="section">COMMON AGENT CORE</text>
  <rect x="392" y="272" width="520" height="568" rx="20" class="panel-dark"/>
  <text x="424" y="312" class="h1-dark">Agent Contract and Execution Loop</text>
  <text x="424" y="338" class="body-dark">The same professional control model applies to every craft, research, orchestration, and support agent.</text>

  <rect x="424" y="366" width="456" height="88" rx="14" fill="#111827" stroke="#334155" stroke-width="1.2"/>
  <text x="446" y="394" class="h2" fill="#FFFFFF">Identity and Scope</text>
  <text x="446" y="416" class="mono-dark">canonical_name | semantic_version | category | owner rubric</text>
  <text x="446" y="436" class="body-dark">Explicit in-scope responsibilities, out-of-scope boundaries, escalation targets, and approval authority.</text>

  <rect x="424" y="478" width="132" height="84" rx="14" fill="#1E293B" stroke="#475569" stroke-width="1.2"/>
  <text x="446" y="508" class="h2" fill="#FFFFFF">1. Plan</text>
  <text x="446" y="530" class="body-dark">Parse brief and select execution path.</text>

  <rect x="574" y="478" width="132" height="84" rx="14" fill="#1E293B" stroke="#475569" stroke-width="1.2"/>
  <text x="596" y="508" class="h2" fill="#FFFFFF">2. Act</text>
  <text x="596" y="530" class="body-dark">Call tools, models, and validators.</text>

  <rect x="724" y="478" width="156" height="84" rx="14" fill="#1E293B" stroke="#475569" stroke-width="1.2"/>
  <text x="746" y="508" class="h2" fill="#FFFFFF">3. Self-Review</text>
  <text x="746" y="530" class="body-dark">Score against rubric and evidence.</text>

  <line x1="556" y1="520" x2="574" y2="520" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <line x1="706" y1="520" x2="724" y2="520" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <path d="M 878 520 C 900 520 900 602 820 602 L 500 602 C 448 602 448 574 448 562" fill="none" stroke="#60A5FA" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="5 4"/>
  <text x="742" y="594" class="small" fill="#93C5FD">bounded revision loop (max retries and escalation on unresolved failure)</text>

  <rect x="424" y="620" width="456" height="88" rx="14" fill="#111827" stroke="#334155" stroke-width="1.2"/>
  <text x="446" y="650" class="h2" fill="#FFFFFF">Critique, Traceability, and Output Contract</text>
  <text x="446" y="672" class="mono-dark">CritiqueMessage | decision log | evidence refs | revision notes</text>
  <text x="446" y="692" class="body-dark">Every output includes machine-readable metadata, rights state, continuity deltas, and downstream handoff information.</text>

  <rect x="424" y="734" width="216" height="70" rx="14" fill="#1F2937" stroke="#475569" stroke-width="1.2"/>
  <text x="446" y="762" class="h2" fill="#FFFFFF">Provenance and Safety</text>
  <text x="446" y="784" class="body-dark">C2PA chain, disclosure flags, rights checks, and abuse screening.</text>

  <rect x="664" y="734" width="216" height="70" rx="14" fill="#1F2937" stroke="#475569" stroke-width="1.2"/>
  <text x="686" y="762" class="h2" fill="#FFFFFF">Observability</text>
  <text x="686" y="784" class="body-dark">Structured logs, state transitions, lineage, and replay context.</text>

  <text x="954" y="258" class="section">QUALITY AND RELEASE CONTROL</text>
  <rect x="954" y="272" width="432" height="210" rx="16" class="panel"/>
  <text x="978" y="302" class="h1">Three-Layer Quality Gate</text>

  <rect x="978" y="324" width="116" height="126" rx="14" class="panel-blue"/>
  <text x="1000" y="352" class="h2">L1 Spec</text>
  <text x="1000" y="374" class="body">Schema, format, timing, codec, and required fields.</text>
  <text x="1000" y="416" class="badge" fill="#1D4ED8">PASS = 100%</text>

  <rect x="1112" y="324" width="116" height="126" rx="14" class="panel-purple"/>
  <text x="1134" y="352" class="h2">L2 Rubric</text>
  <text x="1134" y="374" class="body">Role-specific craft scoring and evidence-based critique.</text>
  <text x="1134" y="416" class="badge" fill="#6D28D9">PASS >= 85/100</text>

  <rect x="1246" y="324" width="116" height="126" rx="14" class="panel-green"/>
  <text x="1268" y="352" class="h2">L3 Preference</text>
  <text x="1268" y="374" class="body">Audience or stakeholder preference against baseline.</text>
  <text x="1268" y="416" class="badge" fill="#047857">PASS >= parity or surpass target</text>

  <line x1="1094" y1="387" x2="1112" y2="387" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <line x1="1228" y1="387" x2="1246" y2="387" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-slate)"/>

  <rect x="954" y="504" width="432" height="182" rx="16" class="panel-green"/>
  <text x="978" y="534" class="h1">Release Package and Delivery Gate</text>
  <text x="978" y="562" class="body">Only artifacts that clear quality, compliance, and provenance checks can advance to release.</text>
  <text x="978" y="590" class="mono">artifact + metadata + rights state + continuity deltas</text>
  <text x="978" y="608" class="mono">qc verdict + target channels + provenance manifest</text>

  <rect x="978" y="626" width="184" height="34" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.2"/>
  <text x="1000" y="648" class="badge" fill="#166534">SIGNED DELIVERY ARTIFACT</text>
  <rect x="1182" y="626" width="180" height="34" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.2"/>
  <text x="1204" y="648" class="badge" fill="#166534">C2PA + AUDITABLE LINEAGE</text>

  <rect x="954" y="718" width="206" height="122" rx="16" class="panel-rose"/>
  <text x="978" y="748" class="h1">Critique and Dispute Flow</text>
  <text x="978" y="776" class="body">Peer review messages carry severity, evidence, rubric reference, and resolution deadline.</text>
  <text x="978" y="804" class="mono">blocker | major | minor | nit</text>

  <rect x="1180" y="718" width="206" height="122" rx="16" class="panel-amber"/>
  <text x="1204" y="748" class="h1">Human Escalation</text>
  <text x="1204" y="776" class="body">Consent, novel legal questions, high-risk publication, festival or classification decisions, and crisis communications.</text>
  <text x="1204" y="804" class="mono">human approval required before continuation</text>

  <text x="54" y="880" class="section">CONTINUOUS IMPROVEMENT</text>
  <rect x="54" y="894" width="1332" height="40" rx="14" class="panel-purple"/>
  <text x="76" y="919" class="body">Operational telemetry, benchmark regressions, red-team findings, expert corrections, and post-launch outcomes feed prompt updates, retraining, rerender rules, and process refinements.</text>

  <line x1="350" y1="364" x2="392" y2="364" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <line x1="350" y1="563" x2="392" y2="563" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="350" y1="755" x2="392" y2="755" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <line x1="912" y1="556" x2="954" y2="556" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <line x1="912" y1="387" x2="954" y2="387" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <path d="M 1112 840 C 1112 900 920 900 920 900 L 724 900" fill="none" stroke="#E11D48" stroke-width="2" marker-end="url(#arrow-rose)" stroke-dasharray="5 4"/>
  <path d="M 1284 840 C 1284 886 1090 886 1090 886 L 1090 894" fill="none" stroke="#D97706" stroke-width="2" marker-end="url(#arrow-amber)" stroke-dasharray="5 4"/>
  <path d="M 720 894 C 720 854 720 854 720 840 C 720 760 720 760 720 708" fill="none" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow-purple)" stroke-dasharray="6 4"/>
  <text x="734" y="836" class="small" fill="#7C3AED">learning loop back into future planning, retrieval, and policy updates</text>

  <g>
    <rect x="1136" y="96" width="250" height="32" rx="16" fill="#0F172A"/>
    <text x="1154" y="117" class="badge" fill="#FFFFFF">COMMON TO ALL AGENTS</text>
    <text x="1280" y="117" class="small" fill="#CBD5E1">craft, research, support, and orchestration roles</text>
  </g>

  <text x="54" y="962" class="footer">Source basis: ai_agent_video_production_workflow.md sections on runtime architecture, handoff contract, critique protocol, quality gates, provenance, and continuous learning. Diagram updated for study/common-agent-structure.svg.</text>
</svg>
